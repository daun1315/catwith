<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #FBFAF7;
    --ink: #22201B;
    --ink-soft: #6B6960;
    --line: #E3E0D6;
    --line-strong: #C9C5B8;
    --spine: #33415C;
    --tag: #A8712F;
    --tag-bg: #A8712F14;
    --card-bg: #FFFFFF;
    --danger: #B14A3C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 40px 24px 120px;
  }
  .toolbar {
    display: flex;
    justify-content: center;
    margin: 0 0 8px;
  }
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--spine);
    color: #fff;
    border: none;
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .add-btn:hover { background: #2A3549; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn svg { width: 16px; height: 16px; }

  .timeline {
    position: relative;
    margin-top: 40px;
    padding: 20px 0 10px;
  }
  .spine-line {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(to bottom, var(--line-strong) 0 4px, transparent 4px 9px);
    transform: translateX(-50%);
  }
  .entry-row {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    align-items: start;
    margin-bottom: 30px;
  }
  .dot {
    grid-column: 2;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--spine);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 2px var(--line-strong);
    margin: 30px auto 0;
    position: relative;
    z-index: 2;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .dot:hover {
    transform: scale(1.6);
    box-shadow: 0 0 0 2px var(--spine);
  }
  .card-slot {
    display: flex;
    min-width: 0;
  }
  .card-slot.left { justify-content: flex-end; padding-right: 24px; }
  .card-slot.right { justify-content: flex-start; padding-left: 24px; }
  .connector {
    position: absolute;
    top: 35px;
    height: 1px;
    background: var(--line-strong);
    width: 24px;
  }
  .entry-row .connector.left { right: calc(50% + 20px); }
  .entry-row .connector.right { left: calc(50% + 20px); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    width: 100%;
    max-width: 340px;
    position: relative;
    cursor: grab;
    transition: border-color 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
  }
  .card:active { cursor: grabbing; }
  .card:hover { border-color: var(--line-strong); }
  .card:hover .card-actions { opacity: 1; }
  .card.dragging { opacity: 0.35; }
  .card.drag-over {
    border-color: var(--spine);
    border-style: dashed;
    box-shadow: 0 0 0 2px var(--spine-soft, rgba(51,65,92,0.12));
  }
  .card-date {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .card-date.muted { color: var(--ink-soft); font-style: italic; }
  .card-person {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    color: var(--tag);
    background: var(--tag-bg);
    padding: 2px 9px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .memo-titles {
    list-style: none;
    margin: 0 0 10px;
    padding: 0;
  }
  .memo-titles li {
    font-size: 14px;
    font-weight: 500;
    padding: 3px 0;
    color: var(--ink);
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    padding: 6px 0 0;
    width: 100%;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }
  .toggle-btn svg {
    width: 12px;
    height: 12px;
    transition: transform 0.15s ease;
  }
  .toggle-btn.open svg { transform: rotate(180deg); }
  .memo-detail {
    display: none;
    margin-top: 10px;
  }
  .memo-detail.open { display: block; }
  .memo-detail-item { margin-bottom: 12px; }
  .memo-detail-item:last-child { margin-bottom: 0; }
  .memo-detail-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .memo-detail-content {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 4px;
    border-radius: 6px;
    display: flex;
  }
  .icon-btn:hover { background: var(--line); color: var(--ink); }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn:disabled { opacity: 0.25; cursor: default; }
  .icon-btn:disabled:hover { background: none; color: var(--ink-soft); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty p:first-child {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(34,32,27,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    max-height: 88vh;
    overflow-y: auto;
    border: 1px solid var(--line);
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 20px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field .hint {
    font-weight: 400;
    color: var(--ink-soft);
    font-size: 12px;
  }
  .field input,
  .field textarea {
    width: 100%;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
  }
  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--spine);
  }
  .field textarea { resize: vertical; min-height: 60px; }

  .side-toggle {
    display: flex;
    gap: 8px;
  }
  .side-btn {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: #fff;
    color: var(--ink-soft);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .side-btn:hover { border-color: var(--spine); }
  .side-btn.active {
    background: var(--spine);
    border-color: var(--spine);
    color: #fff;
  }

  .memo-row {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .memo-row .memo-remove {
    position: absolute;
    top: 8px;
    right: 8px;
  }
  .memo-row input { margin-bottom: 8px; }
  .add-memo-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed var(--line-strong);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    justify-content: center;
  }
  .add-memo-btn:hover { color: var(--ink); border-color: var(--ink-soft); }
  .add-memo-btn svg { width: 14px; height: 14px; }

  .modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
  }
  .btn {
    border: none;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: var(--spine); color: #fff; }
  .btn-primary:hover { background: #2A3549; }
  .btn-ghost { background: none; color: var(--ink-soft); }
  .btn-ghost:hover { color: var(--ink); }
  .btn-danger-text { background: none; color: var(--danger); font-size: 13px; }

  .topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    max-width: 920px;
    margin: 0 auto;
    padding: 16px 24px 0;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .link-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    text-decoration: underline;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    padding: 0;
  }
  .link-btn:hover { color: var(--ink); }
  .auth-error {
    color: var(--danger);
    font-size: 13px;
    margin: -8px 0 12px;
    min-height: 1em;
  }

  @media (max-width: 640px) {
    .wrap { padding: 24px 12px 100px; }
    .entry-row { grid-template-columns: 30px 1fr; }
    .spine-line { left: 15px; }
    .dot { grid-column: 1; margin: 30px 0 0; }
    .card-slot { grid-column: 2; justify-content: flex-start !important; padding: 0 0 0 16px !important; }
    .entry-row .connector { display: none; }
    .card { max-width: none; }
  }
</style>
</head>
<body>
<div class="topbar" id="topbar" style="display:none;">
  <span id="userEmail"></span>
  <button id="logoutBtn" class="link-btn">로그아웃</button>
</div>

<div class="wrap">
  <div class="toolbar">
    <button class="add-btn" id="openAddBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      항목 추가
    </button>
  </div>

  <div class="timeline" id="timeline"></div>
</div>

<div class="modal-overlay open" id="authOverlay">
  <div class="modal">
    <h2 id="authTitle">로그인</h2>
    <p class="hint" style="margin:-12px 0 16px;">이 계정으로 로그인하면 어떤 기기에서든 같은 연표를 볼 수 있어요.</p>
    <form id="authForm">
      <div class="field">
        <label for="authEmail">이메일</label>
        <input type="email" id="authEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label for="authPassword">비밀번호 <span class="hint">(6자 이상)</span></label>
        <input type="password" id="authPassword" required minlength="6" autocomplete="current-password">
      </div>
      <div class="auth-error" id="authError"></div>
      <div class="modal-actions" style="justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" id="switchAuthModeBtn">계정이 없으신가요? 회원가입</button>
        <button type="submit" class="btn btn-primary" id="authSubmitBtn">로그인</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">새 항목 추가</h2>
    <form id="entryForm">
      <div class="field">
        <label for="dateInput">날짜 <span class="hint">(비워도 돼요, 예: "2024" 또는 "미상")</span></label>
        <input type="text" id="dateInput" placeholder="예: 2024.05 / 2024 / 미상">
      </div>
      <div class="field">
        <label for="personInput">인물 <span class="hint">(선택)</span></label>
        <input type="text" id="personInput" placeholder="예: 세종대왕">
      </div>
      <div class="field">
        <label>위치</label>
        <div class="side-toggle" id="sideToggle">
          <button type="button" class="side-btn" data-side="left">왼쪽</button>
          <button type="button" class="side-btn" data-side="right">오른쪽</button>
        </div>
      </div>
      <div class="field">
        <label>메모</label>
        <div id="memoList"></div>
        <button type="button" class="add-memo-btn" id="addMemoBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          메모 추가
        </button>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-danger-text" id="deleteBtn" style="display:none;">삭제</button>
        <div style="display:flex; gap:8px; margin-left:auto;">
          <button type="button" class="btn btn-ghost" id="cancelBtn">취소</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">저장</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
// ── 1) 아래 firebaseConfig 값을 본인의 Firebase 프로젝트 설정으로 바꿔주세요 ──
const firebaseConfig = {
  apiKey: "AIzaSyBQqh6favEs9V_tA18wnQpR0AZJBb-w6X0",
  authDomain: "timeline-d468b.firebaseapp.com",
  projectId: "timeline-d468b",
  storageBucket: "timeline-d468b.firebasestorage.app",
  messagingSenderId: "1070548664526",
  appId: "1:1070548664526:web:0ff4bd91b05d10839c909f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubscribeSnapshot = null;
let isSignupMode = false;

const authOverlay = document.getElementById('authOverlay');
const authForm = document.getElementById('authForm');
const authEmail = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const authError = document.getElementById('authError');
const authTitle = document.getElementById('authTitle');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const switchAuthModeBtn = document.getElementById('switchAuthModeBtn');
const topbar = document.getElementById('topbar');
const userEmailEl = document.getElementById('userEmail');

switchAuthModeBtn.addEventListener('click', () => {
  isSignupMode = !isSignupMode;
  authTitle.textContent = isSignupMode ? '회원가입' : '로그인';
  authSubmitBtn.textContent = isSignupMode ? '가입하기' : '로그인';
  switchAuthModeBtn.textContent = isSignupMode ? '이미 계정이 있으신가요? 로그인' : '계정이 없으신가요? 회원가입';
  authError.textContent = '';
});

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  authError.textContent = '';
  const email = authEmail.value.trim();
  const pw = authPassword.value;
  try {
    if (isSignupMode) {
      await auth.createUserWithEmailAndPassword(email, pw);
    } else {
      await auth.signInWithEmailAndPassword(email, pw);
    }
  } catch (err) {
    authError.textContent = translateAuthError(err.code);
  }
});

function translateAuthError(code) {
  const map = {
    'auth/email-already-in-use': '이미 가입된 이메일이에요.',
    'auth/invalid-email': '이메일 형식이 올바르지 않아요.',
    'auth/weak-password': '비밀번호는 6자 이상이어야 해요.',
    'auth/user-not-found': '가입되지 않은 이메일이에요.',
    'auth/wrong-password': '비밀번호가 틀렸어요.',
    'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않아요.',
    'auth/too-many-requests': '시도가 너무 많아요. 잠시 후 다시 시도해주세요.'
  };
  return map[code] || '문제가 발생했어요. 다시 시도해주세요.';
}

document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

auth.onAuthStateChanged((user) => {
  currentUser = user;
  if (user) {
    authOverlay.classList.remove('open');
    topbar.style.display = 'flex';
    userEmailEl.textContent = user.email;
    authForm.reset();
    subscribeToEntries();
  } else {
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
    topbar.style.display = 'none';
    entries = [];
    render();
    authOverlay.classList.add('open');
  }
});

function subscribeToEntries() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const docRef = db.collection('users').doc(currentUser.uid).collection('timeline').doc('data');
  unsubscribeSnapshot = docRef.onSnapshot((snap) => {
    entries = snap.exists && snap.data().entries ? JSON.parse(snap.data().entries) : [];
    render();
  }, (err) => {
    console.error('동기화 오류', err);
  });
}

async function saveEntries() {
  if (!currentUser) return;
  try {
    await db.collection('users').doc(currentUser.uid).collection('timeline').doc('data').set({
      entries: JSON.stringify(entries),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) {
    console.error('저장 실패', e);
  }
}
</script>
<script>
let entries = [];
let editingId = null;
let draggedId = null;
let currentSide = 'left';
let insertAfterId = null;

const timelineEl = document.getElementById('timeline');
const modalOverlay = document.getElementById('modalOverlay');
const entryForm = document.getElementById('entryForm');
const modalTitle = document.getElementById('modalTitle');
const dateInput = document.getElementById('dateInput');
const personInput = document.getElementById('personInput');
const memoList = document.getElementById('memoList');
const deleteBtn = document.getElementById('deleteBtn');
const sideToggle = document.getElementById('sideToggle');

function setSide(side) {
  currentSide = side;
  sideToggle.querySelectorAll('.side-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.side === side);
  });
}
sideToggle.querySelectorAll('.side-btn').forEach(btn => {
  btn.addEventListener('click', () => setSide(btn.dataset.side));
});

function render() {
  timelineEl.innerHTML = '';

  if (entries.length === 0) {
    timelineEl.innerHTML = `
      <div class="empty">
        <p>아직 기록이 없어요</p>
        <p>첫 번째 항목을 추가해서 연표를 시작해보세요.</p>
      </div>`;
    return;
  }

  // 표시 순서 = entries 배열 순서 그대로 (드래그 또는 위/아래 버튼으로 직접 조정)
  const list = entries;

  const spine = document.createElement('div');
  spine.className = 'spine-line';
  timelineEl.appendChild(spine);

  list.forEach((entry, i) => {
    const side = entry.side === 'right' ? 'right' : 'left';
    const row = document.createElement('div');
    row.className = 'entry-row';

    const leftSlot = document.createElement('div');
    leftSlot.className = 'card-slot left';
    const rightSlot = document.createElement('div');
    rightSlot.className = 'card-slot right';

    const memos = entry.memos || [];
    const hasDate = entry.date && entry.date.trim().length > 0;

    const card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.dataset.id = entry.id;

    let memoTitlesHtml = memos.map(m => `<li>${escapeHtml(m.title || '(제목 없음)')}</li>`).join('');
    let memoDetailHtml = memos.map(m => `
      <div class="memo-detail-item">
        <div class="memo-detail-title">${escapeHtml(m.title || '(제목 없음)')}</div>
        <div class="memo-detail-content">${escapeHtml(m.content || '')}</div>
      </div>`).join('');

    card.innerHTML = `
      <div class="card-actions">
        <button class="icon-btn" data-move-up="${entry.id}" aria-label="위로 이동" ${i === 0 ? 'disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
        <button class="icon-btn" data-move-down="${entry.id}" aria-label="아래로 이동" ${i === list.length - 1 ? 'disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        </button>
        <button class="icon-btn" data-edit="${entry.id}" aria-label="수정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="card-date${hasDate ? '' : ' muted'}">${hasDate ? escapeHtml(entry.date) : '날짜 미상'}</div>
      ${entry.person ? `<div class="card-person">${escapeHtml(entry.person)}</div>` : ''}
      ${memoTitlesHtml ? `<ul class="memo-titles">${memoTitlesHtml}</ul>` : ''}
      ${memos.length ? `
      <button type="button" class="toggle-btn" data-toggle="${entry.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        자세히 보기
      </button>
      <div class="memo-detail" id="detail-${entry.id}">${memoDetailHtml}</div>
      ` : ''}
    `;

    const conn = document.createElement('div');
    conn.className = 'connector ' + side;

    if (side === 'left') leftSlot.appendChild(card);
    else rightSlot.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.title = '이 아래에 항목 추가';
    dot.addEventListener('click', () => openAdd(entry.id));

    row.appendChild(leftSlot);
    row.appendChild(dot);
    row.appendChild(rightSlot);
    row.appendChild(conn);
    timelineEl.appendChild(row);

    // 편집 / 이동 버튼
    card.querySelector('[data-edit]').addEventListener('click', () => openEdit(entry.id));
    const upBtn = card.querySelector('[data-move-up]');
    const downBtn = card.querySelector('[data-move-down]');
    if (upBtn) upBtn.addEventListener('click', () => moveEntry(entry.id, -1));
    if (downBtn) downBtn.addEventListener('click', () => moveEntry(entry.id, 1));

    // 펼치기/접기
    const toggleBtn = card.querySelector('[data-toggle]');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const detail = card.querySelector('.memo-detail');
        const isOpen = detail.classList.toggle('open');
        toggleBtn.classList.toggle('open', isOpen);
      });
    }

    // 드래그로 순서 변경
    card.addEventListener('dragstart', (e) => {
      draggedId = entry.id;
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', entry.id); } catch (err) {}
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedId = null;
      document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (draggedId && draggedId !== entry.id) {
        card.classList.add('drag-over');
      }
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const sourceId = draggedId;
      if (!sourceId || sourceId === entry.id) return;
      reorderEntries(sourceId, entry.id);
    });
  });
}

async function moveEntry(id, direction) {
  const idx = entries.findIndex(e => e.id === id);
  const targetIdx = idx + direction;
  if (idx === -1 || targetIdx < 0 || targetIdx >= entries.length) return;
  [entries[idx], entries[targetIdx]] = [entries[targetIdx], entries[idx]];
  await saveEntries();
  render();
}

async function reorderEntries(sourceId, targetId) {
  const sourceIdx = entries.findIndex(e => e.id === sourceId);
  let targetIdx = entries.findIndex(e => e.id === targetId);
  if (sourceIdx === -1 || targetIdx === -1) return;
  const [moved] = entries.splice(sourceIdx, 1);
  if (sourceIdx < targetIdx) targetIdx -= 1;
  entries.splice(targetIdx, 0, moved);
  await saveEntries();
  render();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function addMemoRow(title = '', content = '') {
  const row = document.createElement('div');
  row.className = 'memo-row';
  row.innerHTML = `
    <button type="button" class="icon-btn memo-remove" aria-label="메모 삭제">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <input type="text" class="memo-title-input" placeholder="메모 제목" value="${escapeHtml(title)}">
    <textarea class="memo-content-input" placeholder="메모 내용">${escapeHtml(content)}</textarea>
  `;
  row.querySelector('.memo-remove').addEventListener('click', () => row.remove());
  memoList.appendChild(row);
}

function openAdd(afterId = null) {
  editingId = null;
  insertAfterId = afterId;
  modalTitle.textContent = afterId ? '이 아래에 항목 추가' : '새 항목 추가';
  entryForm.reset();
  memoList.innerHTML = '';
  addMemoRow();
  const refIdx = afterId ? entries.findIndex(e => e.id === afterId) : entries.length - 1;
  const refSide = refIdx > -1 ? (entries[refIdx].side === 'right' ? 'right' : 'left') : 'right';
  setSide(refSide === 'left' ? 'right' : 'left');
  deleteBtn.style.display = 'none';
  modalOverlay.classList.add('open');
  dateInput.focus();
}

function openEdit(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  insertAfterId = null;
  modalTitle.textContent = '항목 수정';
  dateInput.value = entry.date || '';
  personInput.value = entry.person || '';
  setSide(entry.side === 'right' ? 'right' : 'left');
  memoList.innerHTML = '';
  const memos = entry.memos && entry.memos.length ? entry.memos : [{ title: '', content: '' }];
  memos.forEach(m => addMemoRow(m.title, m.content));
  deleteBtn.style.display = 'inline-block';
  modalOverlay.classList.add('open');
}

function closeModal() {
  modalOverlay.classList.remove('open');
  editingId = null;
  insertAfterId = null;
}

document.getElementById('openAddBtn').addEventListener('click', () => openAdd());
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('addMemoBtn').addEventListener('click', () => addMemoRow());
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

entryForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const memoRows = [...memoList.querySelectorAll('.memo-row')];
  const memos = memoRows.map(row => ({
    title: row.querySelector('.memo-title-input').value.trim(),
    content: row.querySelector('.memo-content-input').value.trim()
  })).filter(m => m.title || m.content);

  const data = {
    date: dateInput.value.trim(),
    person: personInput.value.trim(),
    side: currentSide,
    memos
  };

  if (editingId) {
    const idx = entries.findIndex(en => en.id === editingId);
    if (idx > -1) entries[idx] = { ...entries[idx], ...data };
  } else {
    const newEntry = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), ...data };
    if (insertAfterId) {
      const afterIdx = entries.findIndex(en => en.id === insertAfterId);
      entries.splice(afterIdx > -1 ? afterIdx + 1 : entries.length, 0, newEntry);
    } else {
      entries.push(newEntry);
    }
  }
  await saveEntries();
  closeModal();
  render();
});

deleteBtn.addEventListener('click', async () => {
  if (!editingId) return;
  entries = entries.filter(en => en.id !== editingId);
  await saveEntries();
  closeModal();
  render();
});

// 초기 로드는 auth.onAuthStateChanged 리스너에서 처리돼요.
</script>
</body>
